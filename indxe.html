<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="caculator">
        <input id="display" readonly>
        <div id="keys">
            <button class="but" onclick="clearcalcult()">C</button>
            <button class="but" onclick="deletekey()">D</button>
            <button class="but" onclick="appkeycalculator('%')">%</button>
            <button class="but" onclick="appkeycalculator('/')">/</button>
            <button onclick="appkeycalculator('7')">7</button>
            <button onclick="appkeycalculator('8')">8</button>
            <button onclick="appkeycalculator('9')">9</button>
            <button class="but" onclick="appkeycalculator('*')">*</button>
            <button onclick="appkeycalculator('4')">4</button>
            <button onclick="appkeycalculator('5')">5</button>
            <button onclick="appkeycalculator('6')">6</button>
            <button class="but" onclick="appkeycalculator('-')">-</button>
            <button onclick="appkeycalculator('1')">1</button>
            <button onclick="appkeycalculator('2')">2</button>
            <button onclick="appkeycalculator('3')">3</button>
            <button class="but" onclick="appkeycalculator('+')">+</button>
            <button onclick="appkeycalculator('0')">0</button>
            <button onclick="appkeycalculator('.')">.</button>
            <button class="but" onclick="caculte()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        const appkeycalculator = (input)=>{
            display.value += input;
        }
            const caculte = ()=>{
            
            try {
                display.value = eval(display.value);
            } catch (error) {
                display.value = 'Error';    
            }
        }
        const clearcalcult = ()=>{
            display.value = '';
        }

        const deletekey = ()=>{
            if(display.value === ('undefined' || 'null' || 'Error')){
                display.value = '';
            }
            display.value = display.value.slice(0, -1);
        }



    </script>
</body>
</html>
